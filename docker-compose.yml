version: '3.8'

services:
  # 1. Database MySQL
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rahasia_panti
      MYSQL_DATABASE: pedulipanti
    volumes:
      # Inject file db.sql agar otomatis terimport saat pertama kali menyala
      - ./database/db.sql:/docker-entrypoint-initdb.d/db.sql
    ports:
      - "3306:3306"

  # 2. Backend Laravel
  backend:
    build:
      context: "./PeduliPanti - BE"
      dockerfile: Dockerfile
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db # Terhubung langsung ke service 'db' di atas
      DB_PORT: 3306
      DB_DATABASE: pedulipanti
      DB_USERNAME: root
      DB_PASSWORD: rahasia_panti
    ports:
      - "8000:80"
    depends_on:
      - db

  # 3. Website Admin (Dinsos)
  website-admin:
    image: nginx:alpine
    volumes:
      # Langsung memetakan folder HTML ke Nginx tanpa perlu Dockerfile
      - "./PeduliPanti - Website:/usr/share/nginx/html"
    ports:
      - "8080:80"

  # 4. Frontend Mobile App (versi Web)
  app-frontend:
    build:
      context: "./PeduliPanti - FE"
      dockerfile: Dockerfile
    ports:
      - "8081:80"